<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Blog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>📝 Simple Blog</h1>
        <p>Write • Edit • Share Your Ideas</p>
    </header>
    <div class="container">
        <div class="blog-form">
            <h2>📝Create New Post</h2>
            <input
                type="text"
                id="title"
                placeholder="Enter a Blog Title"
            >
            <textarea
                id="content"
                rows="6"
                placeholder="Write your blog content here...."
            ></textarea>
            <button id="publishBtn">🚀 Publish Post</button>
        </div>
        <div class="search-box">
            <input
                type="text"
                id="search"
                placeholder="🔍 Search Posts..."
            >
        </div>
        <h3 id="totalPosts">Total Posts: 0</h3>
        <div id="posts">
            <div class="empty">
                <h3>📭 No Posts Yet</h3>
                <p>Create your first blog post.</p>
            </div>
        </div>
    </div>
    <footer>
        <p>© 2026 Simple Blog | Made using HTML, CSS & JavaScript ❤️</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
